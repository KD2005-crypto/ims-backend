# 1. DATABASE CONNECTION (Fixed for Railway)
# We use ${MYSQL_URL} so the app connects to the Live Database, not "localhost"
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. HIBERNATE SETTINGS
# 'update' is CRITICAL. It creates the missing 'gstRate' and 'totalCost' columns automatically.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 3. BREVO API SETTINGS
codeb.brevo.apikey=${BREVO_API_KEY}
