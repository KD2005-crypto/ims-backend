# 1. DATABASE CONNECTION (Manual Build)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. HIBERNATE SETTINGS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# ? FIXED: Changed 'MySQL8Dialect' back to 'MySQLDialect' to stop the crash
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 3. BREVO API SETTINGS
codeb.brevo.apikey=${BREVO_API_KEY}
codeb.brevo.sender=dhanshrikalshetti2005@gmail.com