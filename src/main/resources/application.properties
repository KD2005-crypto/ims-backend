# 1. DATABASE CONNECTION
# We build the URL using the variables visible in your screenshot.
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. HIBERNATE SETTINGS
# 'update' creates the missing columns (gstRate, totalCost) automatically.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ? FIXED: Switched back to standard Dialect to prevent ClassNotFoundException
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 3. BREVO API SETTINGS
codeb.brevo.apikey=${BREVO_API_KEY}
codeb.brevo.sender=dhanshrikalshetti2005@gmail.com